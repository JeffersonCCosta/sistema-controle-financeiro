<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Controle Financeiro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="website icon" type="icon" href="../IMG/logo-fincontrol.png">
</head>
<body>

    <aside class="sidebar" id="sidebar">
    <button id="collapseBtn" class="collapse-btn" aria-expanded="true" title="Recolher menu">☰</button>

  <div class="logo">
    <a href="Principal.html" aria-label="Ir para início">
        <img src="../IMG/logoHorizontal-fincontrol.png" alt="Controle Financeiro" class="logo-img">
    </a>
  </div>

  <nav class="menu" aria-label="Navegação principal">
    <button class="menu-item" data-section="dashboard" data-tooltip="Dashboard">📊 <span>Dashboard</span></button>
    <button class="menu-item" data-section="despesas" data-tooltip="Despesas">💸 <span>Despesas</span></button>
    <button class="menu-item" data-section="receitas" data-tooltip="Receitas">💰 <span>Receitas</span></button>
    <button class="menu-item" data-section="categorias" data-tooltip="Categorias">📌 <span>Categorias</span></button>
    <button class="menu-item" data-section="relatorios" data-tooltip="Relatórios">📈 <span>Relatórios</span></button>
  </nav>

  <!--
  <div class="bottom">
    <button class="menu-item" id="logout" data-tooltip="Sair">↩ <span>Sair</span></button>
  </div>
  -->
</aside>

<div class="overlay" id="overlay" aria-hidden="true"></div>


    <div class="main">
        <header class="topbar">
            <button id="toggleMenu" class="menu-btn"></button>
            <h1 id="sectionTitle"></h1>

            <div class="topbar-user" id="userDropdown">
                <button class="user-trigger" id="userTrigger" aria-haspopup="menu" aria-expanded="false">
                    <div class="topbar-avatar" id="topbarAvatar"></div>

                    <div class="topbar-user-info">
                        <p id="topbarUserName"></p>
                        <small id="topbarUserRole"></small>
                    </div>

                    <span class="caret" aria-hidden="true">▾</span>
                </button>

                <div class="user-menu" id="userMenu" role="menu" aria-label="Menu do usuário">
                    <button class="user-menu-item" id="goProfile" role="menuitem">👤 Perfil</button>
                    <button class="user-menu-item" id="goPassword" role="menuitem">🔒 Alterar senha</button>
                    <div class="user-menu-sep" role="separator"></div>
                        <button class="user-menu-item danger" id="menuLogout" role="menuitem">↩ Sair</button>
                    </div>
                </div>
        </header>

        <section id="contentArea">
            <div class="card">
            </div>
        </section>
    </div>

    <div id="logoutModal" class="modal">
        <div class="modal-content">
            <h3>Deseja realmente sair do sistema?</h3>

            <div class="modal-actions">
                <button id="confirmLogout">Sair</button>
                <button id="cancelLogout">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="sessionExpiredModal" class="modal">
        <div class="modal-content">
            <h3>Sessão expirada</h3>
            <p>Sua sessão foi encerrada por inatividade.<br>Faça login novamente para continuar.</p>

            <div class="modal-actions">
                <button id="sessionLoginBtn">Ir para login</button>
            </div>
        </div>
    </div>
    

    <script src="api.js"></script>
    <script src="utils.js"></script>
    <script src="script.js"></script>

</body>
</html>
