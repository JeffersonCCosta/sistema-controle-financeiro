<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registrar - FinControl</title>
  <link rel="stylesheet" href="registrar.css" />
  <link rel="website icon" type="icon" href="../IMG/logo-fincontrol.png">
</head>
<body>
  <main class="container">

    <div class="logo-container">
      <img src="../IMG/logoVertical-fincontrol.png" alt="FinControl - Controle Financeiro" class="logo">
    </div>

    <section class="login-card" aria-label="Formulário de cadastro">
      <form id="registerForm" novalidate>
        <h1>Criar conta</h1>
        <p class="subtitle">Cadastre-se para acessar o FinControl</p>

        <label for="nomeInput" class="label">Nome</label>
        <input
          type="text"
          id="nomeInput"
          name="nome"
          placeholder="Digite seu nome"
          required
        />

        <label for="emailInput" class="label">E-mail</label>
        <input
          type="email"
          id="emailInput"
          name="email"
          autocomplete="email"
          placeholder="seuemail@exemplo.com"
          required
        />

        <label for="passwordInput" class="label">Senha</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="passwordInput"
            name="senha"
            autocomplete="new-password"
            placeholder="Digite sua senha"
            required
            minlength="3"
          />
          <button type="button" id="togglePasswordBtn" class="toggle-password" aria-label="Mostrar senha" aria-pressed="false" title="Mostrar senha">
            <img id="iconEye" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiMwMDAwMDAiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIiBjbGFzcz0ibHVjaWRlIGx1Y2lkZS1leWUtb2ZmLWljb24gbHVjaWRlLWV5ZS1vZmYiPjxwYXRoIGQ9Ik0xMC43MzMgNS4wNzZhMTAuNzQ0IDEwLjc0NCAwIDAgMSAxMS4yMDUgNi41NzUgMSAxIDAgMCAxIDAgLjY5NiAxMC43NDcgMTAuNzQ3IDAgMCAxLTEuNDQ0IDIuNDkiLz48cGF0aCBkPSJNMTQuMDg0IDE0LjE1OGEzIDMgMCAwIDEtNC4yNDItNC4yNDIiLz48cGF0aCBkPSJNMTcuNDc5IDE3LjQ5OWExMC43NSAxMC43NSAwIDAgMS0xNS40MTctNS4xNTEgMSAxIDAgMCAxIDAtLjY5NiAxMC43NSAxMC43NSAwIDAgMSA0LjQ0Ni01LjE0MyIvPjxwYXRoIGQ9Im0yIDIgMjAgMjIiLz48L3N2Zz4=" alt="mostrar senha" />
          </button>
        </div>

        <label for="confirmPasswordInput" class="label">Confirmar senha</label>
        <input
          type="password"
          id="confirmPasswordInput"
          name="confirmarSenha"
          autocomplete="new-password"
          placeholder="Confirme sua senha"
          required
          minlength="3"
        />

        <p id="errorMsg" class="error" aria-live="polite"></p>

        <button id="registerBtn" class="btn" type="submit">
          <span class="btn-text">Cadastrar</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>

        <p id="statusMsg" class="status" aria-live="polite"></p>

        <div class="links">
          <a href="../Login/login.html">Voltar para login</a>
        </div>
      </form>
    </section>
  </main>

  <script src="registrar.js"></script>
</body>
</html>
